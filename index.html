<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rexdarnelco-eng | Portfolio</title>
    <style>
        /* --- THEME COLORS --- */
        :root {
            --bg-color: #0d1117;       /* Deep Dark Blue/Black */
            --card-bg: #161b22;        /* Lighter Dark for boxes */
            --accent-color: #58a6ff;   /* Sleek Developer Blue */
            --text-main: #c9d1d9;      /* Soft White */
            --text-dim: #8b949e;       /* Gray for details */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #30363d;
        }

        h1 { color: var(--accent-color); margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-style: italic; }

        /* --- PROJECTS SECTION --- */
        .project-container {
            max-width: 800px;
            margin: 40px auto;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .project-title {
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .project-tag {
            background: #238636; /* Green for "Live" feel */
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
<style>
    :root {
        --bg: #0d1117;
        --card: #161b22;
        --accent: #58a6ff; /* Blue for Dev */
        --ai-neon: #a371f7; /* Purple for AI */
        --text: #c9d1d9;
    }

    body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
    
    /* --- The Grid System --- */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .project-card {
        background: var(--card);
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 15px;
        transition: 0.3s;
    }

    .project-card:hover { border-color: var(--accent); transform: translateY(-5px); }
    
    /* Special border for AI projects */
    .ai-card { border: 1px solid var(--ai-neon); }

    video { width: 100%; border-radius: 8px; margin-bottom: 10px; }
    
    h2 { border-bottom: 2px solid #30363d; padding-bottom: 10px; margin-top: 40px; }
</style>
<body>
    <h1>rexdarnelco-eng</h1>
    <p style="color: #8b949e;">> Mobile Developer | AI Specialist</p>

    <h2>🎬 AI & Video Works</h2>
    <div class="grid">
        <div class="project-card ai-card">
            <video autoplay loop muted playsinline>
                <source src="your-video.mp4" type="video/mp4">
            </video>
            <div style="color: var(--ai-neon); font-weight: bold;">AI Generative Reel</div>
            <p style="font-size: 0.9rem;">Neural rendering and prompt-based cinematography.</p>
        </div>
        </div>

    <h2>💻 Digital & Dev</h2>
    <div class="grid">
        <div class="project-card">
            <div style="color: var(--accent); font-weight: bold; font-size: 1.2rem;">Image Processing Hub</div>
            <p style="font-size: 0.9rem;">High-fidelity background removal and PSD automation.</p>
        </div>
        <div class="project-card">
            <div style="color: var(--accent); font-weight: bold; font-size: 1.2rem;">Termux Portfolio</div>
            <p style="font-size: 0.9rem;">Full-stack mobile deployment via Git.</p>
        </div>
    </div>
</body>
